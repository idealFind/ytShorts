name: Videos

permissions:
  contents: write
  
on:
  workflow_run:
    workflows: ["Shorts"]
    types:
      - completed
      
  #workflow_dispatch:

  #schedule:
   # - cron: '30 9 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Repo
        uses: actions/checkout@v4

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # INSTALL EDGE-TTS
      # =========================
      - name: Install Edge-TTS
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts

      # =========================
      # INSTALL FFMPEG
      # =========================
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # =========================
      # INSTALL FONTS
      # =========================
      - name: Install Fonts
        run: |
          sudo apt-get install -y fonts-dejavu-core

      # =========================
      # INSTALL PLAYWRIGHT DEPS
      # =========================
      - name: Install Playwright Browsers
        run: |
          mvn exec:java \
          -Dexec.mainClass=com.microsoft.playwright.CLI \
          -Dexec.args="install"
      - name: Install Playwright Dependencies
        run: |
          sudo apt-get update
          npx playwright install --with-deps chromium    
      # =========================
      # MAVEN CACHE
      # =========================
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # =========================
      # BUILD PROJECT
      # =========================
      - name: Build Project
        run: mvn clean compile

      # =========================
      # INSTALL PLAYWRIGHT
      # =========================
      - name: Install Playwright Browsers
        run: |
          mvn exec:java \
          -Dexec.mainClass=com.microsoft.playwright.CLI \
          -Dexec.args="install chromium"

      # =========================
      # VERIFY EDGE-TTS
      # =========================
      - name: Verify Edge-TTS
        run: |
          edge-tts --list-voices | head

      # =========================
      # RUN JAVA APP
      # =========================
      - name: Run Automation
        run: |
          mvn exec:java \
          -Dexec.mainClass="yt.ytVideos"

      - name: Commit reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
        
          git add reports docs
        
          git diff --staged --quiet || git commit -m "Update reports"
        
          git push 
